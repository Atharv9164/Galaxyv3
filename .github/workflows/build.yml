name: Build Android APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev automake

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Set JAVA_HOME
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          sudo update-java-alternatives --set ${JAVA_HOME}
          echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug 2>&1
        env:
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
          ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyAPK
          path: bin/*.apk
          retention-days: 7
