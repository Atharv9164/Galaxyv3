name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.10.11'

      # Step 4: Install Linux packages needed by buildozer
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake

      # Step 5: Install Python build tools
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # Step 6: Fix Java path (avoids common build errors)
      - name: Set JAVA_HOME
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          sudo update-java-alternatives --set ${JAVA_HOME}
          echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV

      # Step 7: Build the APK!
      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      # Step 8: Save the APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyAPK
          path: bin/*.apk
          retention-days: 7
